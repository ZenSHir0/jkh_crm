<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
    <style>
        .auth-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .auth-card {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: var(--bs-border-radius-lg);
            border: 1px solid var(--bs-border-color);
            overflow: hidden;
        }

        .auth-header {
            background: #1A1A2E;
            padding: 2rem 2rem 1.75rem;
            text-align: center;
        }

        .auth-logo {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1.4rem;
            color: #fff;
            letter-spacing: -0.02em;
            margin: 0 0 4px;
        }

        .auth-logo span { color: var(--accent); }

        .auth-subtitle {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.45);
            margin: 0;
        }

        .auth-body { padding: 2rem; }

        .auth-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted-custom);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 6px;
            display: block;
        }

        .auth-input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--bs-border-color);
            border-radius: var(--bs-border-radius);
            font-family: 'Nunito', sans-serif;
            font-size: 0.95rem;
            color: var(--bs-body-color);
            background: var(--bs-body-bg);
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
            margin-bottom: 4px;
        }

        .auth-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(46,91,255,0.12);
        }

        .auth-input.is-invalid {
            border-color: var(--danger);
        }

        .auth-field { margin-bottom: 1.1rem; }

        .field-error {
            font-size: 0.8rem;
            color: var(--danger);
            margin-top: 4px;
            display: none;
        }

        .field-error.visible { display: block; }

        .auth-btn {
            width: 100%;
            padding: 11px;
            background: var(--accent);
            color: var(--accent);
            border: none;
            border-radius: var(--bs-border-radius);
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.15s;
            margin-top: 0.5rem;
        }

        .auth-btn:hover { background: var(--accent-dark); }

        .auth-footer {
            text-align: center;
            margin-top: 1.25rem;
            font-size: 0.875rem;
            color: var(--text-muted-custom);
        }

        .auth-footer a {
            color: var(--accent);
            font-weight: 600;
            text-decoration: none;
        }

        .auth-footer a:hover { text-decoration: underline; }

        .auth-alert {
            border-radius: var(--bs-border-radius);
            padding: 10px 14px;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 1.25rem;
        }

        .auth-alert.success {
            background: var(--success-bg);
            color: #0F6E56;
            border: 1px solid #9FE1CB;
        }

        .auth-alert.danger {
            background: var(--danger-bg);
            color: var(--danger);
            border: 1px solid #F7C1C1;
        }
    </style>
</head>
<body>
<div class="auth-wrap">
    <div class="auth-card">

        <div class="auth-header">
            <p class="auth-logo">ЖКХ<span>.</span>Портал</p>
            <p class="auth-subtitle">Войдите в личный кабинет</p>
        </div>

        <div class="auth-body">

            <div th:if="${param.verified != null and param.verified[0] == 'success'}"
                 class="auth-alert success">
                ✓ Почта подтверждена — можете войти
            </div>
            <div th:if="${param.error}" class="auth-alert danger">
                Неверный логин или пароль
            </div>
            <div th:if="${param.logout}" class="auth-alert success">
                ✓ Вы вышли из системы
            </div>

            <form th:action="@{/login}" method="post" id="loginForm" novalidate>

                <div class="auth-field">
                    <label class="auth-label" for="username">Логин</label>
                    <input class="auth-input" type="text" id="username" name="username" autocomplete="username"/>
                    <div class="field-error" id="username-error">Введите логин</div>
                </div>

                <div class="auth-field">
                    <label class="auth-label" for="password">Пароль</label>
                    <input class="auth-input" type="password" id="password" name="password" autocomplete="current-password"/>
                    <div class="field-error" id="password-error">Введите пароль</div>
                </div>

                <button type="submit" class="auth-btn">Войти</button>
            </form>

            <div class="auth-footer">
                Нет аккаунта? <a href="/register">Зарегистрироваться</a>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        let valid = true;

        const username = document.getElementById('username');
        const usernameError = document.getElementById('username-error');
        if (!username.value.trim()) {
            username.classList.add('is-invalid');
            usernameError.classList.add('visible');
            valid = false;
        } else {
            username.classList.remove('is-invalid');
            usernameError.classList.remove('visible');
        }

        const password = document.getElementById('password');
        const passwordError = document.getElementById('password-error');
        if (!password.value.trim()) {
            password.classList.add('is-invalid');
            passwordError.classList.add('visible');
            valid = false;
        } else {
            password.classList.remove('is-invalid');
            passwordError.classList.remove('visible');
        }

        if (!valid) e.preventDefault();
    });
</script>
</body>
</html>
