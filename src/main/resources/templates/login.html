<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<div class="auth-wrap">
    <div class="auth-card">

        <div class="auth-header">
            <p class="auth-logo">ЖКХ<span>.</span>Портал</p>
            <p class="auth-subtitle">Войдите в личный кабинет</p>
        </div>

        <div class="auth-body">

            <div th:if="${param.verified != null and param.verified[0] == 'success'}"
                 class="auth-alert success">
                ✓ Почта подтверждена — можете войти
            </div>
            <div th:if="${param.error}" class="auth-alert danger">
                Неверный логин или пароль
            </div>
            <div th:if="${param.logout}" class="auth-alert success">
                ✓ Вы вышли из системы
            </div>

            <form th:action="@{/login}" method="post" id="loginForm" novalidate>

                <div class="auth-field">
                    <label class="auth-label" for="username">Логин</label>
                    <input class="auth-input" type="text" id="username" name="username" autocomplete="username"/>
                    <div class="field-error" id="username-error">Введите логин</div>
                </div>

                <div class="auth-field">
                    <label class="auth-label" for="password">Пароль</label>
                    <input class="auth-input" type="password" id="password" name="password" autocomplete="current-password"/>
                    <div class="field-error" id="password-error">Введите пароль</div>
                </div>

                <button type="submit" class="auth-btn">Войти</button>
            </form>

            <div class="auth-footer" style="margin-top: 0.75rem;">
                <a th:href="@{/forgot-password}">Забыли пароль?</a>
            </div>

            <div class="auth-footer">
                Нет аккаунта? <a th:href="@{/register}">Зарегистрироваться</a>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        let valid = true;

        const username = document.getElementById('username');
        const usernameError = document.getElementById('username-error');
        if (!username.value.trim()) {
            username.classList.add('is-invalid');
            usernameError.classList.add('visible');
            valid = false;
        } else {
            username.classList.remove('is-invalid');
            usernameError.classList.remove('visible');
        }

        const password = document.getElementById('password');
        const passwordError = document.getElementById('password-error');
        if (!password.value.trim()) {
            password.classList.add('is-invalid');
            passwordError.classList.add('visible');
            valid = false;
        } else {
            password.classList.remove('is-invalid');
            passwordError.classList.remove('visible');
        }

        if (!valid) e.preventDefault();
    });
</script>
</body>
</html>
