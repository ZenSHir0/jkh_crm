<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6"
      lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="'Заявка #' + ${request.id} + ' — ЖКХ.Портал'">Заявка</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <link rel="stylesheet" th:href="@{/css/request-details.css}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"/>

<div class="page-wrap">

  <div th:if="${success}" class="auth-alert success" th:text="${success}"></div>
  <div th:if="${error}"   class="auth-alert danger"  th:text="${error}"></div>

  <!-- Hero -->
  <div class="page-hero" style="margin-bottom:1.5rem">
    <div>
      <div class="hero-eyebrow">
        <a href="/requests/my" style="color:var(--muted);text-decoration:none">
          <i class="bi bi-arrow-left"></i> Мои заявки
        </a>
      </div>
      <h1 class="hero-title" style="font-size:1.3rem">
        Заявка <span th:text="'#' + ${request.id}"></span>
      </h1>
      <p class="hero-sub" th:text="${request.type.displayName}"></p>
    </div>
    <span class="status" th:classappend="${request.status.badgeClass}" th:text="${request.status.displayName}"></span>
  </div>

  <div class="row g-4">

    <!-- Left column -->
    <div th:classappend="${isMaster} ? 'col-lg-8' : 'col-12'">

      <div class="card mb-3">
        <div class="card-head"><span class="card-head-title">Основная информация</span></div>
        <div style="padding:0 1.25rem">
          <div class="field-row" th:if="${isMaster}">
            <span class="field-label">Клиент</span>
            <span class="field-value" th:text="${request.resident.fullName}"></span>
          </div>
          <div class="field-row">
            <span class="field-label">Заголовок</span>
            <span class="field-value" th:text="${request.title}"></span>
          </div>
          <div class="field-row">
            <span class="field-label">Тип</span>
            <span class="field-value" th:text="${request.type.displayName}"></span>
          </div>
          <div class="field-row">
            <span class="field-label">Мастер</span>
            <span class="field-value" th:if="${request.master != null}" th:text="${request.master.fullName}"></span>
            <span class="field-value muted" th:if="${request.master == null}">Не назначен</span>
          </div>
          <div class="field-row">
            <span class="field-label">Создана</span>
            <span class="field-value" th:text="${#temporals.format(request.createdAt, 'dd.MM.yyyy HH:mm')}"></span>
          </div>
          <div class="field-row" th:if="${request.deadline != null}">
            <span class="field-label">Дедлайн</span>
            <span class="field-value" th:text="${#temporals.format(request.deadline, 'dd.MM.yyyy HH:mm')}"></span>
          </div>
          <div class="field-row" th:if="${request.closedAt != null}">
            <span class="field-label">Закрыта</span>
            <span class="field-value" th:text="${#temporals.format(request.closedAt, 'dd.MM.yyyy HH:mm')}"></span>
          </div>
        </div>
      </div>

      <div class="card mb-3">
        <div class="card-head"><span class="card-head-title">Описание</span></div>
        <div style="padding:1rem 1.25rem;font-size:.875rem;color:var(--navy2);line-height:1.65" th:text="${request.description}"></div>
      </div>

      <div class="card mb-3" th:if="${!photos.isEmpty()}">
        <div class="card-head"><span class="card-head-title">Прикреплённые фото</span></div>
        <div style="padding:1rem 1.25rem;display:flex;flex-wrap:wrap;gap:.75rem">
          <img th:each="photo : ${photos}"
               th:src="@{${photo.filePath}}"
               alt="Фото"
               style="max-width:200px;border-radius:8px;border:1px solid var(--border);object-fit:cover">
        </div>
      </div>

      <div class="card">
        <div class="card-head"><span class="card-head-title">Комментарии</span></div>
        <div style="padding:0 1.25rem">
          <div th:if="${comments.isEmpty()}" class="empty-comments">Комментариев пока нет</div>
          <div th:each="comment : ${comments}" class="comment-item">
            <span class="comment-author" th:text="${comment.author.fullName}"></span>
            <span class="comment-date" th:text="${#temporals.format(comment.createdAt, 'dd.MM.yyyy HH:mm')}"></span>
            <p class="comment-text" th:text="${comment.text}"></p>
          </div>
        </div>
        <div th:if="${request.status.name() == 'NEW' or request.status.name() == 'IN_PROGRESS'}"
             class="comment-form-section">
          <form th:action="@{/requests/{id}/comment(id=${request.id})}" method="post">
            <label class="form-label-custom">Новый комментарий</label>
            <textarea name="text" class="form-input" rows="3"
                      placeholder="Напишите комментарий..." required></textarea>
            <button type="submit" class="btn-prim btn-sm" style="margin-top:.65rem">
              <i class="bi bi-send"></i> Отправить
            </button>
          </form>
        </div>
      </div>

    </div>

    <!-- Right column: actions (master only) -->
    <div class="col-lg-4" th:if="${isMaster}">
      <div class="actions-panel">
        <div class="actions-panel-header">Действия</div>
        <div style="padding:1rem;display:flex;flex-direction:column;gap:.75rem">

          <form th:if="${request.status.name() == 'NEW'}"
                th:action="@{/requests/{id}/accept(id=${request.id})}" method="post">
            <button type="submit" class="btn-prim w-100" style="justify-content:center">
              <i class="bi bi-play-fill"></i> Взять в работу
            </button>
          </form>

          <form th:if="${request.status.name() == 'IN_PROGRESS'}"
                th:action="@{/requests/{id}/complete(id=${request.id})}" method="post">
            <button type="submit" class="btn-prim w-100" style="justify-content:center">
              <i class="bi bi-check2-circle"></i> Отправить на проверку
            </button>
          </form>

          <div th:if="${request.status.name() == 'PENDING_REVIEW'}"
               style="text-align:center;color:var(--muted);font-size:.82rem;padding:.5rem 0">
            Работа отправлена на проверку администратору
          </div>

          <form th:if="${request.status.name() == 'DONE' or request.status.name() == 'REJECTED'}"
                th:action="@{/requests/{id}/reopen(id=${request.id})}" method="post">
            <button type="submit" class="btn-ghost w-100" style="justify-content:center">
              <i class="bi bi-arrow-counterclockwise"></i> Возобновить
            </button>
          </form>

          <div th:if="${request.status.name() == 'NEW' or request.status.name() == 'IN_PROGRESS'}">
            <button type="button" class="btn-danger-ghost w-100" style="justify-content:center"
                    onclick="toggleRejectForm()">
              <i class="bi bi-x-circle"></i> Отклонить заявку
            </button>
            <div id="rejectForm" class="reject-form">
              <form th:action="@{/requests/{id}/reject(id=${request.id})}" method="post">
                <label class="auth-label">Причина отказа</label>
                <textarea name="reason" class="form-input" rows="4"
                          placeholder="Опишите причину..." required></textarea>
                <div class="d-flex gap-2 mt-2">
                  <button type="submit" class="btn btn-danger flex-fill btn-sm">Подтвердить</button>
                  <button type="button" class="btn btn-outline-secondary flex-fill btn-sm"
                          onclick="toggleRejectForm()">Отмена</button>
                </div>
              </form>
            </div>
          </div>

        </div>
      </div>
    </div>

  </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"/>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function toggleRejectForm() {
    document.getElementById('rejectForm').classList.toggle('visible');
  }
</script>
</body>
</html>
