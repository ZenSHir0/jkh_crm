<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Заявка №<span th:text="${request.id}"/></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
    <link rel="stylesheet" th:href="@{/css/request-details.css}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"/>

<div class="container mt-4 mb-5">

    <div th:if="${success}" class="auth-alert success mb-3" th:text="${success}"></div>
    <div th:if="${error}" class="auth-alert danger mb-3" th:text="${error}"></div>

    <!-- Заголовок страницы -->
    <div class="d-flex align-items-center gap-3 mb-4">
        <a href="/requests/my" class="btn btn-sm btn-outline-secondary">← Назад</a>
        <div>
            <p class="page-title">Заявка №<span th:text="${request.id}"/></p>
            <p class="page-subtitle mb-0" th:text="${request.type.displayName}"></p>
        </div>
        <span class="status ms-auto" th:classappend="${request.status.badgeClass}" th:text="${request.status.displayName}"></span>
    </div>

    <div class="row g-4">
        <!-- Левая колонка: информация -->
        <div class="col-lg-8">

            <!-- Основная информация -->
            <div class="detail-card">
                <div class="detail-card-header">Основная информация</div>
                <div class="detail-card-body">
                    <div class="field-row" th:if="${isMaster}">
                        <span class="field-label">Клиент</span>
                        <span class="field-value" th:text="${request.resident.fullName}"></span>
                    </div>
                    <div class="field-row">
                        <span class="field-label">Заголовок</span>
                        <span class="field-value" th:text="${request.title}"></span>
                    </div>
                    <div class="field-row">
                        <span class="field-label">Тип</span>
                        <span class="field-value" th:text="${request.type.displayName}"></span>
                    </div>
                    <div class="field-row">
                        <span class="field-label">Мастер</span>
                        <span class="field-value" th:if="${request.master != null}" th:text="${request.master.fullName}"></span>
                        <span class="field-value muted" th:if="${request.master == null}">Не назначен</span>
                    </div>
                    <div class="field-row">
                        <span class="field-label">Создана</span>
                        <span class="field-value" th:text="${#temporals.format(request.createdAt, 'dd.MM.yyyy HH:mm')}"></span>
                    </div>
                    <div class="field-row" th:if="${request.deadline != null}">
                        <span class="field-label">Дедлайн</span>
                        <span class="field-value" th:text="${#temporals.format(request.deadline, 'dd.MM.yyyy HH:mm')}"></span>
                    </div>
                    <div class="field-row" th:if="${request.closedAt != null}">
                        <span class="field-label">Закрыта</span>
                        <span class="field-value" th:text="${#temporals.format(request.closedAt, 'dd.MM.yyyy HH:mm')}"></span>
                    </div>
                </div>
            </div>

            <!-- Описание -->
            <div class="detail-card">
                <div class="detail-card-header">Описание</div>
                <div class="description-body" th:text="${request.description}"></div>
            </div>

            <!-- Фото -->
            <div class="detail-card" th:if="${!photos.isEmpty()}">
                <div class="detail-card-header">Прикреплённые фото</div>
                <div class="description-body">
                    <div class="d-flex flex-wrap gap-3">
                        <img th:each="photo : ${photos}"
                             th:src="@{${photo.filePath}}"
                             alt="Фото"
                             class="img-fluid rounded"
                             style="max-width: 220px; border: 1px solid var(--bs-border-color);">
                    </div>
                </div>
            </div>

            <!-- Комментарии -->
            <div class="detail-card">
                <div class="detail-card-header">Комментарии</div>
                <div class="detail-card-body">
                    <div th:if="${comments.isEmpty()}" class="empty-comments">Комментариев пока нет</div>
                    <div th:each="comment : ${comments}" class="comment-item">
                        <span class="comment-author" th:text="${comment.author.fullName}"></span>
                        <span class="comment-date" th:text="${#temporals.format(comment.createdAt, 'dd.MM.yyyy HH:mm')}"></span>
                        <p class="comment-text" th:text="${comment.text}"></p>
                    </div>
                </div>

                <div th:if="${isMaster and (request.status.name() == 'NEW' or request.status.name() == 'IN_PROGRESS')}"
                     class="comment-form-section">
                    <form th:action="@{/requests/{id}/comment(id=${request.id})}" method="post">
                        <label class="auth-label">Новый комментарий</label>
                        <textarea name="text" class="auth-input" rows="3"
                                  placeholder="Напишите комментарий..." required></textarea>
                        <button type="submit" class="auth-btn comment-submit">Отправить</button>
                    </form>
                </div>
            </div>

        </div>

        <!-- Правая колонка: действия мастера -->
        <div class="col-lg-4" th:if="${isMaster}">
            <div class="actions-card">
                <div class="actions-card-header">Действия</div>
                <div class="actions-card-body">

                    <!-- Взять в работу — только NEW -->
                    <div th:if="${request.status.name() == 'NEW'}">
                        <p class="action-section-label">Принять заявку</p>
                        <form th:action="@{/requests/{id}/accept(id=${request.id})}" method="post">
                            <button type="submit" class="btn-accept">Взять в работу</button>
                        </form>
                        <hr class="actions-divider">
                    </div>

                    <!-- Работа выполнена — только IN_PROGRESS -->
                    <div th:if="${request.status.name() == 'IN_PROGRESS'}">
                        <p class="action-section-label">Завершить заявку</p>
                        <form th:action="@{/requests/{id}/complete(id=${request.id})}" method="post">
                            <button type="submit" class="btn-complete">Работа выполнена</button>
                        </form>
                        <hr class="actions-divider">
                    </div>

                    <!-- Отклонить — NEW или IN_PROGRESS -->
                    <div th:if="${request.status.name() == 'NEW' or request.status.name() == 'IN_PROGRESS'}">
                        <p class="action-section-label">Отказ</p>
                        <button type="button" class="btn-reject" onclick="toggleRejectForm()">Отклонить заявку</button>

                        <div id="rejectForm" class="reject-form">
                            <form th:action="@{/requests/{id}/reject(id=${request.id})}" method="post">
                                <label class="auth-label">Причина отказа</label>
                                <textarea name="reason" class="auth-input" rows="4"
                                          placeholder="Опишите причину..." required></textarea>
                                <div class="d-flex gap-2 mt-2">
                                    <button type="submit" class="btn-reject-confirm">Подтвердить</button>
                                    <button type="button" class="btn-cancel" onclick="toggleRejectForm()">Отмена</button>
                                </div>
                            </form>
                        </div>
                    </div>

                </div>
            </div>
        </div>

    </div>
</div>

<script>
    function toggleRejectForm() {
        document.getElementById('rejectForm').classList.toggle('visible');
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
