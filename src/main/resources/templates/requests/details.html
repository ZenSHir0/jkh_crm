<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Детали заявки</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"/>

<div class="container mt-4">

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <h2>Заявка №<span th:text="${request.id}"/></h2>

    <div class="card mb-4">
        <div class="card-header">Основная информация</div>
        <div class="card-body">
            <p><strong>Заголовок:</strong> <span th:text="${request.title}"></span></p>
            <p><strong>Тип:</strong> <span th:text="${request.type.displayName}"></span></p>
            <p><strong>Статус:</strong> <span class="badge" th:classappend="${request.status.badgeClass}" th:text="${request.status.displayName}"></span></p>
            <p><strong>Мастер:</strong> <span th:text="${request.master?.fullName ?: 'Не назначен'}"></span></p>
            <p><strong>Дата создания:</strong> <span th:text="${#temporals.format(request.createdAt, 'dd.MM.yyyy HH:mm')}"></span></p>
            <p th:if="${request.deadline != null}"><strong>Дедлайн:</strong> <span th:text="${#temporals.format(request.deadline, 'dd.MM.yyyy HH:mm')}"></span></p>
            <p th:if="${request.closedAt != null}"><strong>Дата закрытия:</strong> <span th:text="${#temporals.format(request.closedAt, 'dd.MM.yyyy HH:mm')}"></span></p>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-header">Описание</div>
        <div class="card-body">
            <p th:text="${request.description}"></p>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-header">Прикреплённые фото</div>
        <div class="card-body">
            <div th:if="${photos.isEmpty()}">Фото нет</div>
            <div th:each="photo : ${photos}" class="mb-3">
                <img th:src="@{${photo.filePath}}" alt="Фото" class="img-fluid" style="max-width: 300px;">
            </div>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-header">Комментарии</div>
        <div class="card-body">
            <div th:if="${comments.isEmpty()}">Комментариев нет</div>
            <div th:each="comment : ${comments}">
                <p>
                    <strong th:text="${comment.author.fullName}"></strong>
                    (<span th:text="${#temporals.format(comment.createdAt, 'dd.MM.yyyy HH:mm')}"></span>):
                </p>
                <p th:text="${comment.text}"></p>
                <hr>
            </div>

            <!-- Форма добавления комментария для мастера -->
            <div th:if="${isMaster and (request.status.name() == 'NEW' or request.status.name() == 'IN_PROGRESS')}">
                <form th:action="@{/requests/{id}/comment(id=${request.id})}" method="post" class="mt-3">
                    <div class="mb-2">
                        <label class="form-label fw-semibold">Добавить комментарий</label>
                        <textarea name="text" class="form-control" rows="3" placeholder="Текст комментария..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-outline-primary btn-sm">Отправить</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Кнопки действий мастера -->
    <div th:if="${isMaster}" class="mt-4 d-flex flex-wrap gap-2 align-items-start">

        <!-- Взять в работу — только для NEW -->
        <form th:if="${request.status.name() == 'NEW'}"
              th:action="@{/requests/{id}/accept(id=${request.id})}" method="post">
            <button type="submit" class="btn btn-success">Взять в работу</button>
        </form>

        <!-- Отклонить — для NEW и IN_PROGRESS -->
        <div th:if="${request.status.name() == 'NEW' or request.status.name() == 'IN_PROGRESS'}">
            <button type="button" class="btn btn-danger" onclick="toggleRejectForm()">Отклонить заявку</button>

            <form id="rejectForm" th:action="@{/requests/{id}/reject(id=${request.id})}" method="post"
                  class="mt-3 p-3 border rounded bg-light" style="display:none; min-width: 320px;">
                <label class="form-label fw-semibold">Причина отказа</label>
                <textarea name="reason" class="form-control mb-2" rows="3"
                          placeholder="Опишите причину отказа..." required></textarea>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-danger btn-sm">Подтвердить отказ</button>
                    <button type="button" class="btn btn-secondary btn-sm" onclick="toggleRejectForm()">Отмена</button>
                </div>
            </form>
        </div>
    </div>

    <div class="mt-4">
        <a href="/requests/my" class="btn btn-secondary">Назад к моим заявкам</a>
    </div>
</div>

<script>
    function toggleRejectForm() {
        const form = document.getElementById('rejectForm');
        form.style.display = form.style.display === 'none' ? 'block' : 'none';
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
