<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6"
      lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мои заявки — ЖКХ.Портал</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"/>

<div class="page-wrap">

  <!-- Hero — Resident -->
  <div sec:authorize="hasRole('RESIDENT')">
    <div class="page-hero">
      <div>
        <div class="hero-eyebrow">Мой кабинет</div>
        <h1 class="hero-title">Мои заявки</h1>
      </div>
      <a href="/requests/new" class="btn-prim"><i class="bi bi-plus"></i> Новая заявка</a>
    </div>
  </div>

  <!-- Hero — Master -->
  <div sec:authorize="hasRole('MASTER')">
    <div class="page-hero master-hero">
      <div>
        <div class="hero-eyebrow">Назначенные мне</div>
        <h1 class="hero-title">Мои заявки</h1>
      </div>
    </div>
  </div>

  <!-- Table -->
  <div class="card">
    <div class="req-row th-row" style="grid-template-columns:44px 1fr auto auto 90px">
      <span class="col-hdr">№</span>
      <span class="col-hdr">Заявка</span>
      <span class="col-hdr">Статус</span>
      <span class="col-hdr">Дата</span>
      <span></span>
    </div>

    <div th:if="${requests.isEmpty()}" style="padding:3rem 1.25rem;text-align:center;color:var(--muted)">
      <div style="font-size:2rem;margin-bottom:.5rem;opacity:.4"><i class="bi bi-clipboard"></i></div>
      <p style="margin:0;font-size:.875rem">Заявок пока нет</p>
    </div>

    <div th:each="request : ${requests}"
         class="req-row"
         style="grid-template-columns:44px 1fr auto auto 90px"
         th:onclick="|location.href='/requests/${request.id}'|">
      <span class="req-num" th:text="'#' + ${request.id}"></span>
      <div>
        <div class="req-title-main" th:text="${request.title}"></div>
        <div class="req-type" th:text="${request.type.displayName}"></div>
      </div>
      <span class="status" th:classappend="${request.status.badgeClass}" th:text="${request.status.displayName}"></span>
      <span class="req-date" th:text="${#temporals.format(request.createdAt, 'dd MMM', new java.util.Locale('ru'))}"></span>
      <div style="display:flex;justify-content:flex-end">
        <a th:href="@{/requests/{id}(id=${request.id})}" class="btn-ghost btn-sm" onclick="event.stopPropagation()">Детали</a>
      </div>
    </div>
  </div>

  <!-- Pagination -->
  <nav th:if="${totalPages > 1}" aria-label="Пагинация" style="margin-top:1.25rem">
    <ul class="pagination justify-content-center">
      <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled' : ''">
        <a class="page-link" th:href="@{/requests/my(page=${currentPage - 1})}">← Назад</a>
      </li>
      <li th:each="p : ${#numbers.sequence(0, totalPages - 1)}"
          class="page-item"
          th:classappend="${p == currentPage} ? 'active' : ''">
        <a class="page-link" th:href="@{/requests/my(page=${p})}" th:text="${p + 1}"></a>
      </li>
      <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled' : ''">
        <a class="page-link" th:href="@{/requests/my(page=${currentPage + 1})}">Вперёд →</a>
      </li>
    </ul>
  </nav>

</div>

<footer th:replace="~{fragments/layout :: footer}"/>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
