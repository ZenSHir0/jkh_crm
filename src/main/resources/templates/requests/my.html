<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мои заявки</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"/>

<div class="container mt-4">
    <h2>Мои заявки</h2>

    <table class="table table-striped table-hover">
        <thead>
        <tr>
            <th>ID</th>
            <th>Заголовок</th>
            <th>Тип</th>
            <th>Статус</th>
            <th>Дата создания</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="request : ${requests}">
            <td th:text="${request.id}"></td>
            <td th:text="${request.title}"></td>
            <td th:text="${request.type.displayName}"></td>
            <td><span class="status" th:classappend="${request.status.badgeClass}" th:text="${request.status.displayName}"></span></td>
            <td th:text="${#temporals.format(request.createdAt, 'dd.MM.yyyy HH:mm')}"></td>
            <td>
                <a th:href="@{/requests/{id}(id=${request.id})}" class="btn btn-sm btn-info">Детали</a>
            </td>
        </tr>
        </tbody>
    </table>

    <nav aria-label="Pagination">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:if="${currentPage > 0}">
                <a class="page-link" th:href="@{/my-requests(page=${currentPage - 1})}">Предыдущая</a>
            </li>
            <li th:each="p : ${#numbers.sequence(0, totalPages - 1)}" class="page-item" th:classappend="${p == currentPage ? 'active' : ''}">
                <a class="page-link" th:href="@{/my-requests(page=${p})}" th:text="${p + 1}"></a>
            </li>
            <li class="page-item" th:if="${currentPage < totalPages - 1}">
                <a class="page-link" th:href="@{/my-requests(page=${currentPage + 1})}">Следующая</a>
            </li>
        </ul>
    </nav>
</div>
</body>
</html>
