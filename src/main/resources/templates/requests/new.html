<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Создание заявки</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"/>

<div class="container mt-4">
    <h2>Подать новую заявку</h2>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <form th:object="${request}" th:action="@{/requests/new}" method="post" enctype="multipart/form-data">
        <div class="mb-3">
            <label for="title" class="form-label">Заголовок заявки</label>
            <input type="text" class="form-control" id="title" th:field="*{title}" required>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
        </div>

        <div class="mb-3">
            <label for="description" class="form-label">Описание проблемы</label>
            <textarea class="form-control" id="description" rows="5" th:field="*{description}" required></textarea>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
        </div>

        <div class="mb-3">
            <label for="type" class="form-label">Тип обращения</label>
            <select class="form-select" id="type" th:field="*{type}" required>
                <option value="">Выберите тип</option>
                <option th:each="type : ${types}" th:value="${type}" th:text="${type.displayName}"></option>
            </select>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('type')}" th:errors="*{type}"></div>
        </div>

        <div class="mb-3">
            <label for="photos" class="form-label">Прикрепить фото (до 5 штук)</label>
            <input type="file" class="form-control" id="photos" name="photos" multiple accept="image/*">
            <small class="form-text text-muted">Макс. размер файла 10 МБ</small>
        </div>

        <button type="submit" class="btn btn-primary">Подать заявку</button>
    </form>

</div>
</body>
</html>
