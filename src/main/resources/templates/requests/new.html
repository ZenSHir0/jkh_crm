<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Новая заявка — ЖКХ.Портал</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"/>

<div class="page-wrap" style="max-width:680px">

  <div class="page-hero">
    <div>
      <div class="hero-eyebrow">Обращение в УК</div>
      <h1 class="hero-title">Новая заявка</h1>
      <p class="hero-sub">Опишите проблему — назначим мастера в течение 24 часов</p>
    </div>
  </div>

  <div th:if="${error}" class="auth-alert danger" th:text="${error}"></div>
  <div th:if="${success}" class="auth-alert success" th:text="${success}"></div>

  <div class="card" style="padding:1.5rem">
    <form th:object="${request}" th:action="@{/requests/new}" method="post" enctype="multipart/form-data"
          style="display:flex;flex-direction:column;gap:1.1rem">

      <div>
        <label class="form-label-custom">Тип обращения</label>
        <select class="form-input" th:field="*{type}" required>
          <option value="">— выберите тип —</option>
          <option th:each="type : ${types}" th:value="${type}" th:text="${type.displayName}"></option>
        </select>
        <div th:if="${#fields.hasErrors('type')}" style="font-size:.8rem;color:#F58585;margin-top:.25rem" th:errors="*{type}"></div>
      </div>

      <div>
        <label class="form-label-custom">Заголовок</label>
        <input class="form-input" type="text" th:field="*{title}" placeholder="Кратко опишите проблему" required>
        <div th:if="${#fields.hasErrors('title')}" style="font-size:.8rem;color:#F58585;margin-top:.25rem" th:errors="*{title}"></div>
      </div>

      <div>
        <label class="form-label-custom">Описание</label>
        <textarea class="form-input" rows="5" th:field="*{description}"
                  placeholder="Подробно опишите ситуацию, укажите этаж или подъезд если нужно…" required></textarea>
        <div th:if="${#fields.hasErrors('description')}" style="font-size:.8rem;color:#F58585;margin-top:.25rem" th:errors="*{description}"></div>
      </div>

      <div>
        <label class="form-label-custom">
          Фотографии <span style="color:var(--muted);font-weight:400">(необязательно)</span>
        </label>
        <label for="photos" style="border:1.5px dashed var(--border);border-radius:8px;padding:1.4rem;text-align:center;
               color:var(--muted);font-size:.82rem;cursor:pointer;background:var(--bg);transition:border-color .12s;display:block"
               onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">
          <i class="bi bi-cloud-upload" style="font-size:1.3rem;display:block;margin-bottom:.35rem"></i>
          Нажмите для выбора или перетащите файлы<br>
          <span style="font-size:.7rem">JPEG, PNG · до 10 МБ · максимум 5 файлов</span>
        </label>
        <input type="file" id="photos" name="photos" multiple accept="image/*" class="d-none">
        <div id="fileNames" style="font-size:.75rem;color:var(--muted);margin-top:.4rem"></div>
        <div class="form-hint">Макс. размер файла 10 МБ</div>
      </div>

      <div class="d-flex gap-2 justify-content-end" style="border-top:1px solid var(--border);padding-top:1rem">
        <a href="/requests/my" class="btn-ghost">Отмена</a>
        <button type="submit" class="btn-prim"><i class="bi bi-send"></i> Отправить заявку</button>
      </div>
    </form>
  </div>

</div>

<footer th:replace="~{fragments/layout :: footer}"/>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.getElementById('photos').addEventListener('change', function() {
    const names = Array.from(this.files).map(f => f.name).join(', ');
    document.getElementById('fileNames').textContent = names || '';
  });
</script>
</body>
</html>
