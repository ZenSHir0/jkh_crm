<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Изменение пароля — ЖКХ.Портал</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"/>

<div class="page-wrap" style="max-width:480px">

  <div class="page-hero" style="margin-bottom:1.5rem">
    <div>
      <div class="hero-eyebrow">
        <a href="/profile" style="color:var(--muted);text-decoration:none">
          <i class="bi bi-arrow-left"></i> Профиль
        </a>
      </div>
      <h1 class="hero-title" style="font-size:1.3rem">Изменение пароля</h1>
    </div>
  </div>

  <div th:if="${error}" class="auth-alert danger" th:text="${error}"></div>

  <div class="card" style="padding:1.5rem">
    <form th:action="@{/profile/change-password}" method="post" id="changeForm" novalidate
          style="display:flex;flex-direction:column;gap:1rem">

      <div>
        <label class="form-label-custom" for="currentPassword">Текущий пароль</label>
        <input class="form-input" type="password" id="currentPassword" name="currentPassword"
               autocomplete="current-password" placeholder="Введите текущий пароль"/>
        <div class="field-error" id="current-error">Введите текущий пароль</div>
      </div>

      <div>
        <label class="form-label-custom" for="newPassword">Новый пароль</label>
        <input class="form-input" type="password" id="newPassword" name="newPassword"
               autocomplete="new-password" placeholder="Минимум 6 символов"/>
        <div class="field-error" id="new-error">Введите новый пароль</div>
      </div>

      <div>
        <label class="form-label-custom" for="confirmPassword">Повторите пароль</label>
        <input class="form-input" type="password" id="confirmPassword" name="confirmPassword"
               autocomplete="new-password" placeholder="Повторите новый пароль"/>
        <div class="field-error" id="confirm-error">Введите пароль</div>
      </div>

      <div class="d-flex gap-2 justify-content-end" style="border-top:1px solid var(--border);padding-top:1rem">
        <a href="/profile" class="btn-ghost">Отмена</a>
        <button type="submit" class="btn-prim"><i class="bi bi-lock-fill"></i> Сохранить</button>
      </div>
    </form>
  </div>

</div>

<footer th:replace="~{fragments/layout :: footer}"/>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.getElementById('changeForm').addEventListener('submit', function(e) {
    let valid = true;
    const fields = [
      { id: 'currentPassword', errorId: 'current-error' },
      { id: 'newPassword',     errorId: 'new-error' },
      { id: 'confirmPassword', errorId: 'confirm-error' },
    ];
    fields.forEach(({ id, errorId }) => {
      const input = document.getElementById(id);
      const error = document.getElementById(errorId);
      if (!input.value.trim()) {
        input.classList.add('is-invalid');
        error.classList.add('visible');
        valid = false;
      } else {
        input.classList.remove('is-invalid');
        error.classList.remove('visible');
      }
    });
    const newPwd = document.getElementById('newPassword');
    const confirmPwd = document.getElementById('confirmPassword');
    if (valid && newPwd.value !== confirmPwd.value) {
      confirmPwd.classList.add('is-invalid');
      const err = document.getElementById('confirm-error');
      err.textContent = 'Пароли не совпадают';
      err.classList.add('visible');
      valid = false;
    }
    if (!valid) e.preventDefault();
  });
</script>
</body>
</html>
