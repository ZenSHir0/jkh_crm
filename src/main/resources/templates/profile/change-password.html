<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Изменение пароля</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"/>

<div class="auth-wrap">
    <div class="auth-card">

        <div class="auth-header">
            <p class="auth-logo">ЖКХ<span>.</span>Портал</p>
            <p class="auth-subtitle">Изменение пароля</p>
        </div>

        <div class="auth-body">

            <div th:if="${error}" class="auth-alert danger" th:text="${error}"></div>

            <form th:action="@{/profile/change-password}" method="post" id="changeForm" novalidate>

                <div class="auth-field">
                    <label class="auth-label" for="currentPassword">Текущий пароль</label>
                    <input class="auth-input" type="password" id="currentPassword" name="currentPassword" autocomplete="current-password"/>
                    <div class="field-error" id="current-error">Введите текущий пароль</div>
                </div>

                <div class="auth-field">
                    <label class="auth-label" for="newPassword">Новый пароль</label>
                    <input class="auth-input" type="password" id="newPassword" name="newPassword" autocomplete="new-password"/>
                    <div class="field-error" id="new-error">Введите новый пароль</div>
                </div>

                <div class="auth-field">
                    <label class="auth-label" for="confirmPassword">Повторите пароль</label>
                    <input class="auth-input" type="password" id="confirmPassword" name="confirmPassword" autocomplete="new-password"/>
                    <div class="field-error" id="confirm-error">Введите пароль</div>
                </div>

                <button type="submit" class="auth-btn">Сохранить</button>
            </form>

            <div class="auth-footer">
                <a th:href="@{/profile}">← Вернуться в профиль</a>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('changeForm').addEventListener('submit', function(e) {
        let valid = true;

        const fields = [
            { id: 'currentPassword', errorId: 'current-error' },
            { id: 'newPassword',     errorId: 'new-error' },
            { id: 'confirmPassword', errorId: 'confirm-error' },
        ];

        fields.forEach(({ id, errorId }) => {
            const input = document.getElementById(id);
            const error = document.getElementById(errorId);
            if (!input.value.trim()) {
                input.classList.add('is-invalid');
                error.classList.add('visible');
                valid = false;
            } else {
                input.classList.remove('is-invalid');
                error.classList.remove('visible');
            }
        });

        const newPwd = document.getElementById('newPassword');
        const confirmPwd = document.getElementById('confirmPassword');
        if (valid && newPwd.value !== confirmPwd.value) {
            confirmPwd.classList.add('is-invalid');
            const err = document.getElementById('confirm-error');
            err.textContent = 'Пароли не совпадают';
            err.classList.add('visible');
            valid = false;
        }

        if (!valid) e.preventDefault();
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
