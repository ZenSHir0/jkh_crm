<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Профиль</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container">
        <a href="/" class="navbar-brand">На главную</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a href="/logout" class="nav-link">Выход</a></li>
            </ul>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <h2>Профиль</h2>
    <div class="row">
        <div class="col-md-6">
            <div class="card mb-4">
                <div class="card-header">Личные данные</div>
                <div class="card-body">
                    <form th:action="@{/profile/update}" method="post" th:object="${user}">
                        <p>Логин: <span th:text="${user.username}"/>
                            <input type="text" class="d-none" th:field="*{username}" th:value="${user.username}"/>
                        </p>
                        <p>Email: <span th:text="${user.email}"/></p>
                        <p>Имя:
                            <span class="view-mode" th:text="${user.name}"/>
                            <input class="mt-1 form-control edit-mode d-none" type="text" name="name" th:field="*{name}" th:value="${user.name}"/>
                        </p>
                        <p>Фамилия:
                            <span class="view-mode" th:text="${user.surname}"/>
                            <input class="mt-1 form-control edit-mode d-none" type="text" name="surname" th:field="*{surname}" th:value="${user.surname}"/>
                        </p>
                        <p>Отчество:
                            <span class="view-mode" th:text="${user.lastName}"/>
                            <input class="mt-1 form-control edit-mode d-none" type="text" name="lastName" th:field="*{lastName}" th:value="${user.lastName}"/>
                        </p>
                        <p>Телефон:
                            <span class="view-mode" th:text="${user.phone}"/>
                            <input class="mt-1 form-control edit-mode d-none" type="text" name="phone" th:field="*{phone}" th:value="${user.phone}"/>
                        </p>
                        <div class="mb-3">
                            <label class="form-label">Дом (улица, номер)</label>
                            <p class="mb-0 view-mode" th:text="${user.building ?: 'Не указан'}"></p>
                            <input class="form-control edit-mode d-none" type="text" th:field="*{building}" placeholder="ул. Ленина, 10" />
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Квартира</label>
                            <p class="mb-0 view-mode" th:text="${user.apartment ?: 'Не указана'}"></p>
                            <input class="form-control edit-mode d-none" type="text" th:field="*{apartment}" placeholder="45" />
                        </div>
                        <button type="button" id="editBtn" class="btn btn-primary btn-sm" onclick="enableEdit()">Редактировать</button>
                        <button type="submit" id="saveBtn" class="btn btn-success btn-sm d-none" onclick="cancelEdit()">Сохранить</button>
                        <button type="button" id="cancelBtn" class="btn btn-danger btn-sm d-none" onclick="cancelEdit()">Отменить</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card mb-4">
                <div class="card-header">Быстрые действия</div>
                <div class="card-body">
                    <a th:href="@{/requests/new}" class="btn btn-secondary d-block mb-2">Подать заявку</a>
                    <a th:href="@{/meters/submit}" class="btn btn-secondary d-block mb-2">Подать показания</a>
                    <a href="#" class="btn btn-secondary d-block mb-2">Изменить пароль</a>
                </div>
            </div>
        </div>
    </div>

    <h3>История заявок</h3>
    <table class="table table-striped">
        <thead>
        <tr>
            <th>№</th>
            <th>Тип заявки</th>
            <th>Статус</th>
            <th>Дата</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td colspan="5" class="text-center">Вы ещё не создавали заявок.</td>
        </tr>
<!--            <tr>-->
<!--                <td>1</td>-->
<!--                <td>Заявка на ремонт</td>-->
<!--                <td>В работе</td>-->
<!--                <td>10.08.2023</td>-->
<!--                <td>-->
<!--                    <a href="#" class="btn btn-sm btn-primary">Подробнее</a>-->
<!--                    <a href="#" class="btn btn-sm btn-secondary">Откликнуться</a>-->
<!--                </td>-->
<!--            </tr>-->
        </tbody>
    </table>
</div>
</body>
<script>
    function enableEdit() {
        document.querySelectorAll('.view-mode').forEach(el => el.classList.add('d-none'));
        document.querySelectorAll('.edit-mode').forEach(el => el.classList.remove('d-none'));

        document.getElementById('editBtn').classList.add('d-none');
        document.getElementById('saveBtn').classList.remove('d-none');
        document.getElementById('cancelBtn').classList.remove('d-none');
    }

    function cancelEdit() {
        document.querySelectorAll('.view-mode').forEach(el => el.classList.remove('d-none'));
        document.querySelectorAll('.edit-mode').forEach(el => el.classList.add('d-none'));

        document.getElementById('editBtn').classList.remove('d-none');
        document.getElementById('saveBtn').classList.add('d-none');
        document.getElementById('cancelBtn').classList.add('d-none');
    }

</script>
</html>
