<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Профиль</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"/>

<div class="page-wrap">
    <div th:if="${errors}" class="error-toast">
        <p th:each="error : ${errors}" th:text="${error}"></p>
    </div>

    <h1>Профиль</h1>

    <!-- MAIN GRID -->
    <div class="main-grid">

        <div class="card">
            <div class="card-header">
                <span>Мои данные</span>
                <button type="button" id="editBtn" class="btn btn-soft-primary btn-sm" onclick="enableEdit()">
                    ✏️ Редактировать
                </button>
            </div>
            <div class="card-body">
                <form th:action="@{/profile/update}" method="post" th:object="${user}">
                    <input type="text" class="d-none" th:field="*{username}" />
                    <input type="text" class="d-none" th:field="*{email}" />

                    <div class="field-row">
                        <span class="field-label">Имя</span>
                        <span class="field-value view-mode" th:text="${user.name}">—</span>
                        <input class="form-control edit-mode d-none" type="text" th:field="*{name}" />
                    </div>
                    <div class="field-row">
                        <span class="field-label">Фамилия</span>
                        <span class="field-value view-mode" th:text="${user.surname}">—</span>
                        <input class="form-control edit-mode d-none" type="text" th:field="*{surname}" />
                    </div>
                    <div class="field-row">
                        <span class="field-label">Отчество</span>
                        <span class="field-value view-mode" th:text="${user.lastName}">—</span>
                        <input class="form-control edit-mode d-none" type="text" th:field="*{lastName}" />
                    </div>
                    <div class="field-row">
                        <span class="field-label">Телефон</span>
                        <span class="field-value view-mode" th:text="${user.phone ?: '—'}">—</span>
                        <input class="edit-mode d-none form-control" type="text" th:field="*{phone}"/>
                    </div>
                    <div class="field-row">
                        <span class="field-label">Адрес</span>
                        <span class="field-value view-mode" th:text="${user.building ?: '—'}">—</span>
                        <input class="form-control edit-mode d-none" type="text" th:field="*{building}" placeholder="ул. Ленина" />
                    </div>
                    <div class="field-row">
                        <span class="field-label">Квартира</span>
                        <span class="field-value view-mode" th:text="${user.apartment ?: '—'}">—</span>
                        <input class="form-control edit-mode d-none" type="text" th:field="*{apartment}" placeholder="45" />
                    </div>

                    <div class="btn-group-form edit-mode d-none">
                        <button type="submit" class="btn btn-success btn-sm">✓ Сохранить</button>
                        <button type="button" class="btn btn-secondary btn-sm" onclick="cancelEdit()">Отменить</button>
                    </div>
                </form>

                <!-- разделитель — данные аккаунта не редактируются -->
                <div class="field-divider">Аккаунт</div>

                <div class="field-row">
                    <span class="field-label">Логин</span>
                    <span class="field-value" th:text="${user.username}">—</span>
                </div>
                <div class="field-row">
                    <span class="field-label">Email</span>
                    <span class="field-value" th:text="${user.email}">—</span>
                </div>
            </div>
        </div>

        <!-- RIGHT COLUMN -->
        <div class="d-flex flex-column gap-3">

            <!-- QUICK ACTIONS -->
            <div class="card">
                <div class="card-header">
                    <span>Быстрые действия</span>
                </div>
                <div class="card-body">
                    <a th:href="@{/requests/new}" class="action-btn">
                        <span class="action-icon blue">📋</span>
                        <span>Подать заявку</span>
                    </a>
                    <a th:href="@{/meters/submit}" class="action-btn">
                        <span class="action-icon green">📊</span>
                        <span>Передать показания</span>
                    </a>
                    <a href="#" class="action-btn">
                        <span class="action-icon amber">🔒</span>
                        <span>Изменить пароль</span>
                    </a>
                </div>
            </div>

        </div>
    </div>

    <!-- REQUESTS TABLE -->
    <div class="card">
        <div class="card-header">
            <span>История заявок</span>
        </div>
        <table class="table table-hover mb-0">
            <thead>
            <tr>
                <th>№</th>
                <th>Заголовок</th>
                <th>Статус</th>
                <th>Дата</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="request : ${requests}">
                <td th:text="${request.id}"></td>
                <td th:text="${request.title}"></td>
                <td>
                    <span class="status" th:classappend="${request.status.badgeClass}" th:text="${request.status.displayName}"></span>
                </td>
                <td th:text="${#temporals.format(request.createdAt, 'dd.MM.yyyy')}"></td>
                <td>
                    <a th:href="@{/requests/{id}(id=${request.id})}" class="btn btn-soft-primary btn-sm">Подробнее</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(requests)}">
                <td colspan="5">
                    <div class="empty-state">
                        <div class="empty-icon">📂</div>
                        <p>Вы не создавали заявок</p>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/imask"></script>

<script>
    function enableEdit() {
        document.querySelectorAll('.view-mode').forEach(el => el.classList.add('d-none'));
        document.querySelectorAll('.edit-mode').forEach(el => el.classList.remove('d-none'));
        document.getElementById('editBtn').classList.add('d-none');
        const phoneInput = document.querySelector('input[name="phone"]');
        if (phoneInput && !phoneInput._imask) {
            phoneInput._imask = IMask(phoneInput, {
                mask: '+{7} (000) 000-00-00'
            });
        }
    }

    function cancelEdit() {
        document.querySelectorAll('.view-mode').forEach(el => el.classList.remove('d-none'));
        document.querySelectorAll('.edit-mode').forEach(el => el.classList.add('d-none'));
        document.getElementById('editBtn').classList.remove('d-none');
    }

</script>
</body>
</html>
