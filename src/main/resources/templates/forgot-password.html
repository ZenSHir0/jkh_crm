<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Восстановление пароля</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<div class="auth-wrap">
    <div class="auth-card">

        <div class="auth-header">
            <p class="auth-logo">ЖКХ<span>.</span>Портал</p>
            <p class="auth-subtitle">Восстановление пароля</p>
        </div>

        <div class="auth-body">

            <div th:if="${param.sent != null}" class="auth-alert success">
                ✓ Если аккаунт с таким email существует, мы отправили ссылку для сброса пароля
            </div>

            <p style="font-size: 0.875rem; color: var(--text-muted-custom); margin-bottom: 1.25rem;">
                Укажите email, привязанный к аккаунту — мы отправим ссылку для сброса пароля.
            </p>

            <form th:action="@{/forgot-password}" method="post" id="forgotForm" novalidate>

                <div class="auth-field">
                    <label class="auth-label" for="email">Email</label>
                    <input class="auth-input" type="email" id="email" name="email" autocomplete="email"/>
                    <div class="field-error" id="email-error">Введите email</div>
                </div>

                <button type="submit" class="auth-btn">Отправить ссылку</button>
            </form>

            <div class="auth-footer">
                <a th:href="@{/login}">← Вернуться ко входу</a>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('forgotForm').addEventListener('submit', function(e) {
        const email = document.getElementById('email');
        const error = document.getElementById('email-error');
        if (!email.value.trim()) {
            email.classList.add('is-invalid');
            error.classList.add('visible');
            e.preventDefault();
        } else {
            email.classList.remove('is-invalid');
            error.classList.remove('visible');
        }
    });
</script>
</body>
</html>
