<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Главная</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/home">На главную</a>
        <ul class="navbar-nav ms-auto">
            <li class="nav-item">
                <a class="nav-link" href="/logout">Выход</a>
            </li>
        </ul>
    </div>
</nav>
<div class="container mt-5">
    <h1>Добро пожаловать в CRM, <span th:text="${#authentication.principal.name}"/> <span th:text="${#authentication.principal.lastName}"/>!</h1>
    <p>Вы вошли как <span th:text="${#authentication.principal.username}"></span></p>
    <a href="/requests/my" class="btn btn-primary">Мои заявки</a>
    <a href="/requests/new" class="btn btn-primary">Создать заявку</a>
    <a href="/profile" class="btn btn-primary">Профиль</a>
    <a th:if="${#authorization.expression('hasRole(''ADMIN'')')}" href="/admin/dashboard" class="btn btn-primary">Панель управления</a>
    <a th:if="${#authorization.expression('hasRole(''ADMIN'')')}" href="/admin/requests" class="btn btn-primary">Список заявок</a>
</div>
</body>
</html>
