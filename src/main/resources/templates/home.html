<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Главная</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"/>
<div class="container mt-5">
    <h1>Добро пожаловать в CRM, <span th:text="${#authentication.principal.name}"/> <span th:text="${#authentication.principal.lastName}"/>!</h1>
    <p>Вы вошли как <span th:text="${#authentication.principal.username}"></span></p>
    <a th:if="${#authorization.expression('!hasRole(''ADMIN'')')}" href="/requests/my" class="btn btn-primary">Мои заявки</a>
    <a th:if="${#authorization.expression('hasRole(''RESIDENT'')')}" href="/requests/new" class="btn btn-primary">Создать заявку</a>
    <a href="/profile" class="btn btn-primary">Профиль</a>
    <a th:if="${#authorization.expression('hasRole(''ADMIN'')')}" href="/admin/dashboard" class="btn btn-primary">Список пользователей</a>
    <a th:if="${#authorization.expression('hasRole(''ADMIN'')')}" href="/admin/requests" class="btn btn-primary">Список заявок</a>
    <a th:if="${#authorization.expression('hasRole(''ADMIN'')')}" href="/admin/buildings" class="btn btn-primary">Список домов</a>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
