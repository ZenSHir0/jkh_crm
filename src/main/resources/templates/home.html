<!DOCTYPE html>
<html xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6"
      lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Главная — ЖКХ.Портал</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"/>

<div class="page-wrap">

  <div sec:authorize="hasRole('RESIDENT')">
    <div th:replace="~{fragments/home :: resident}"/>
  </div>

  <!-- ══ MASTER HOME ══ -->
  <div sec:authorize="hasRole('MASTER')">
    <div th:replace="~{fragments/home :: master}"/>
  </div>

  <!-- ══ ADMIN HOME ══ -->
  <div sec:authorize="hasRole('ADMIN')">
    <div th:replace="~{fragments/home :: admin}"/>
  </div>

</div>

<footer th:replace="~{fragments/layout :: footer}"/>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
