<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Баланс мастера</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
    <link rel="stylesheet" th:href="@{/css/request-details.css}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"/>

<div class="container mt-4 mb-5">

    <div th:if="${success}" class="auth-alert success mb-3" th:text="${success}"></div>
    <div th:if="${error}" class="auth-alert danger mb-3" th:text="${error}"></div>

    <div class="d-flex align-items-center gap-3 mb-4">
        <a href="/admin/dashboard" class="btn btn-sm btn-outline-secondary">← Назад</a>
        <div>
            <h4 class="mb-0" th:text="${master.fullName}"></h4>
            <small class="text-muted">Баланс и начисления</small>
        </div>
        <span class="ms-auto fs-4 fw-bold" th:text="${master.balance + ' ₽'}"></span>
    </div>

    <div class="row g-4">

        <!-- История транзакций -->
        <div class="col-lg-8">
            <div class="card">
                <div class="card-header">История начислений</div>
                <div class="card-body p-0">
                    <div th:if="${transactions.isEmpty()}" class="text-center py-4 text-muted">
                        Операций пока нет
                    </div>
                    <div th:each="tx : ${transactions}" class="field-row px-4">
                        <div class="d-flex flex-column">
                            <span class="field-value" th:text="${tx.type.displayName}"></span>
                            <small class="text-muted" th:text="${tx.comment}"></small>
                            <small class="text-muted"
                                   th:text="${#temporals.format(tx.createdAt, 'dd.MM.yyyy HH:mm')} + ' · ' + ${tx.createdBy.fullName}">
                            </small>
                        </div>
                        <span class="ms-auto fw-bold"
                              th:classappend="${tx.type.name() == 'FINE' or tx.type.name() == 'PAYOUT'} ? 'text-danger' : 'text-success'"
                              th:text="${(tx.type.name() == 'FINE' ? '−' : (tx.type.name() == 'PAYOUT' ? '−' : '+'))} + ${tx.amount} + ' ₽'">
                        </span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Панель действий -->
        <div class="col-lg-4">
            <div class="actions-panel">
                <div class="actions-panel-header">Управление балансом</div>
                <div class="p-3 d-grid gap-3">

                    <!-- Выплата -->
                    <form th:action="@{/admin/masters/{id}/payout(id=${master.id})}" method="post">
                        <button type="submit" class="btn btn-success w-100"
                                th:disabled="${master.balance <= 0}">
                            Выплатить <span th:text="${master.balance + ' ₽'}"></span>
                        </button>
                    </form>

                    <hr class="my-1" style="border-color: var(--bs-border-color);">

                    <!-- Бонус -->
                    <div>
                        <button type="button" class="btn btn-outline-primary w-100"
                                onclick="toggleForm('bonusForm')">Начислить бонус</button>
                        <div id="bonusForm" class="reject-form" style="border-color: var(--bs-border-color); background: var(--accent-light);">
                            <form th:action="@{/admin/masters/{id}/bonus(id=${master.id})}" method="post">
                                <label class="auth-label">Сумма (₽)</label>
                                <input type="number" name="amount" class="auth-input" min="1" required>
                                <label class="auth-label mt-2">Комментарий</label>
                                <input type="text" name="comment" class="auth-input" required>
                                <div class="d-flex gap-2 mt-2">
                                    <button type="submit" class="btn btn-primary flex-fill">Начислить</button>
                                    <button type="button" class="btn btn-outline-secondary flex-fill"
                                            onclick="toggleForm('bonusForm')">Отмена</button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <!-- Штраф -->
                    <div>
                        <button type="button" class="btn btn-outline-danger w-100"
                                onclick="toggleForm('fineForm')">Назначить штраф</button>
                        <div id="fineForm" class="reject-form">
                            <form th:action="@{/admin/masters/{id}/fine(id=${master.id})}" method="post">
                                <label class="auth-label">Сумма штрафа (₽)</label>
                                <input type="number" name="amount" class="auth-input" min="1" required>
                                <label class="auth-label mt-2">Причина</label>
                                <input type="text" name="comment" class="auth-input" required>
                                <div class="d-flex gap-2 mt-2">
                                    <button type="submit" class="btn btn-danger flex-fill">Применить</button>
                                    <button type="button" class="btn btn-outline-secondary flex-fill"
                                            onclick="toggleForm('fineForm')">Отмена</button>
                                </div>
                            </form>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleForm(id) {
        document.getElementById(id).classList.toggle('visible');
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
