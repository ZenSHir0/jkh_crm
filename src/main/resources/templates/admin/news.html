<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новости</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"/>

<div class="page-wrap">

    <div class="page-hero admin-hero">
        <div>
            <div class="hero-eyebrow">Управление</div>
            <h1 class="hero-title">Новости</h1>
        </div>
    </div>

    <div class="card">
        <div class="req-row th-row req-row--news">
            <span class="col-hdr">№</span>
            <span class="col-hdr">Новость</span>
            <span class="col-hdr">Категория</span>
            <span class="col-hdr">Действует до</span>
            <span></span>
        </div>

        <div th:if="${news.isEmpty()}" class="req-empty">
            <div class="req-empty-icon"><i class="bi bi-newspaper"></i></div>
            <p class="req-empty-text">Новостей пока нет</p>
        </div>

        <div th:each="item : ${news}"
             class="req-row req-row--news"
             th:onclick="|location.href='/admin/news/${item.id}'|">

            <span class="req-num" th:text="'#' + ${item.id}"></span>

            <div>
                <div class="req-title-main" th:text="${item.title}"></div>
                <div class="req-type" th:text="${item.description}"></div>
            </div>

            <span class="status"
                  th:classappend="${item.category.badgeClass}"
                  th:text="${item.category.displayName}"></span>

            <span class="req-date"
                  th:text="${#temporals.format(item.validUntil, 'dd.MM.yyyy')}"></span>

            <div class="req-actions">
                <a th:href="@{/admin/news/{id}(id=${item.id})}"
                   class="btn-ghost btn-sm"
                   onclick="(e => e.stopPropagation())(event)">Детали</a>
            </div>
        </div>
    </div>

</div>
</body>
</html>
