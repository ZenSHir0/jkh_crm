<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Детали заявки</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/home">На главную</a>
        <ul class="navbar-nav ms-auto">
            <li class="nav-item">
                <a class="nav-link" href="/logout">Выход</a>
            </li>
        </ul>
    </div>
</nav>

<div class="container mt-4">
    <h2>Заявка №<span th:text="${request.id}"/></h2>

    <div class="card mb-4">
        <div class="card-header">Основная информация</div>
        <div class="card-body">
            <p><strong>Житель:</strong> <span th:text="${request.resident.fullName}"></span></p>
            <p><strong>Мастер:</strong> <span th:text="${request.master?.fullName ?: 'Не назначен'}"></span></p>
            <p><strong>Заголовок:</strong> <span th:text="${request.title}"></span></p>
            <p><strong>Тип:</strong> <span th:text="${request.type.displayName}"></span></p>
            <p><strong>Статус:</strong> <span class="badge" th:classappend="${request.status.badgeClass}" th:text="${request.status.displayName}"></span></p>
            <p><strong>Дата создания:</strong> <span th:text="${#temporals.format(request.createdAt, 'dd.MM.yyyy HH:mm')}"></span></p>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-header">Описание</div>
        <div class="card-body">
            <p th:text="${request.description}"></p>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-header">Прикреплённые фото</div>
        <div class="card-body">
            <div th:if="${photos.isEmpty()}">Фото нет</div>
            <div th:each="photo : ${photos}" class="mb-3">
                <img th:src="@{${photo.filePath}}" alt="Фото" class="img-fluid" style="max-width: 300px;">
            </div>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-header">Комментарии</div>
        <div class="card-body">
            <div th:if="${comments.isEmpty()}">Комментариев нет</div>
            <div th:each="comment : ${comments}">
                <p><strong><span th:text="${comment.author.fullName}"></span></strong> (<span th:text="${#temporals.format(comment.createdAt, 'dd.MM.yyyy HH:mm')}"></span>):</p>
                <p th:text="${comment.text}"></p>
                <hr>
            </div>
        </div>
    </div>

    <!--TODO Make buttons work-->
    <div class="mt-4">
        <a href="/admin/requests" class="btn btn-secondary">Назад</a>
        <button class="btn btn-primary">Назначить мастера</button>
        <button class="btn btn-success">Изменить статус</button>
        <button class="btn btn-info">Добавить комментарий</button>
    </div>
</div>
</body>
</html>
