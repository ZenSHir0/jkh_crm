<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Дома — ЖКХ.Портал</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"/>

<div class="page-wrap">

  <div class="page-hero admin-hero">
    <div>
      <div class="hero-eyebrow">Управление</div>
      <h1 class="hero-title">Дома</h1>
      <p class="hero-sub"><strong th:text="${buildings.size()} + ' домов'">0 домов</strong> на обслуживании</p>
    </div>
  </div>

  <div th:if="${success}" class="auth-alert success" th:text="${success}"></div>
  <div th:if="${error}"   class="auth-alert danger"  th:text="${error}"></div>

  <div class="row g-4">

    <!-- Building list -->
    <div class="col-lg-8">
      <form method="get" class="d-flex gap-2 mb-3">
        <input type="text" name="search" class="form-input"
               placeholder="Поиск по адресу..."
               th:value="${search}"
               style="max-width:320px">
        <button type="submit" class="btn-prim"><i class="bi bi-search"></i></button>
        <a th:if="${search != null and !#strings.isEmpty(search)}"
           href="/admin/buildings" class="btn-ghost"><i class="bi bi-x"></i> Сброс</a>
      </form>

      <div class="card">
        <div class="card-head">
          <span class="card-head-title">Обслуживаемые дома</span>
          <span style="font-size:.75rem;color:var(--muted)" th:text="${buildings.size()} + ' адресов'"></span>
        </div>

        <div th:if="${buildings.isEmpty()}"
             style="padding:3rem 1.25rem;text-align:center;color:var(--muted)">
          <div style="font-size:2rem;margin-bottom:.5rem;opacity:.4"><i class="bi bi-building-x"></i></div>
          <p style="margin:0;font-size:.875rem">Дома ещё не добавлены</p>
        </div>

        <div th:each="building : ${buildings}"
             style="display:flex;align-items:center;padding:.85rem 1.25rem;border-bottom:1px solid var(--border)">
          <div style="flex:1">
            <div class="req-title-main" th:text="${building.address}"></div>
          </div>
          <form th:action="@{/admin/buildings/{id}/delete(id=${building.id})}" method="post"
                class="ms-auto">
            <button type="submit" class="btn-danger-ghost">
              <i class="bi bi-trash"></i>
            </button>
          </form>
        </div>
      </div>
    </div>

    <!-- Add form -->
    <div class="col-lg-4">
      <div class="card">
        <div class="card-head"><span class="card-head-title">Добавить дом</span></div>
        <div style="padding:1.1rem 1.25rem;display:flex;flex-direction:column;gap:.85rem">
          <form th:action="@{/admin/buildings}" method="post"
                style="display:flex;flex-direction:column;gap:.85rem">
            <div>
              <label class="form-label-custom">Адрес</label>
              <input type="text" name="address" class="form-input"
                     placeholder="ул. Ленина, 10" required>
              <div class="form-hint">Введите полный почтовый адрес</div>
            </div>
            <button type="submit" class="btn-prim" style="justify-content:center">
              <i class="bi bi-plus-lg"></i> Добавить дом
            </button>
          </form>
        </div>
      </div>
    </div>

  </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"/>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
