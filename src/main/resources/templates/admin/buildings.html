<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Дома</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
    <link rel="stylesheet" th:href="@{/css/request-details.css}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"/>

<div class="container mt-4 mb-5">

    <div th:if="${success}" class="auth-alert success mb-3" th:text="${success}"></div>
    <div th:if="${error}" class="auth-alert danger mb-3" th:text="${error}"></div>

    <div class="d-flex align-items-center gap-3 mb-4">
        <a href="/admin/dashboard" class="btn btn-sm btn-outline-secondary">← Назад</a>
        <h4 class="mb-0">Обслуживаемые дома</h4>
    </div>

    <div class="row g-4">

        <!-- Список домов -->
        <div class="col-lg-8">
            <div class="card">
                <div class="card-header">Список домов</div>
                <div class="card-body p-0">
                    <div th:if="${buildings.isEmpty()}" class="text-center py-4 text-muted">
                        Дома ещё не добавлены
                    </div>
                    <div th:each="building : ${buildings}" class="field-row px-4">
                        <span class="field-value" th:text="${building.address}"></span>
                        <form th:action="@{/admin/buildings/{id}/delete(id=${building.id})}" method="post" class="ms-auto">
                            <button type="submit" class="btn btn-sm btn-outline-danger">Удалить</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Форма добавления -->
        <div class="col-lg-4">
            <div class="actions-panel">
                <div class="actions-panel-header">Добавить дом</div>
                <div class="p-3">
                    <form th:action="@{/admin/buildings}" method="post">
                        <label class="auth-label">Адрес</label>
                        <input type="text" name="address" class="auth-input"
                               placeholder="ул. Ленина, 10" required>
                        <button type="submit" class="auth-btn mt-2">Добавить</button>
                    </form>
                </div>
            </div>
        </div>

    </div>
</div>
</body>
</html>
