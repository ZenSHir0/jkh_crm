<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Пользователи</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"/>
<div class="container mt-4 mb-5">
    <h4 class="mb-3">Список пользователей</h4>

    <form method="get" class="mb-4">
        <div class="input-group" style="max-width: 420px;">
            <input type="text" name="search" class="form-control"
                   placeholder="Поиск по имени, логину, email..."
                   th:value="${search}">
            <button type="submit" class="btn btn-primary">Найти</button>
            <a th:if="${search != null and !#strings.isEmpty(search)}"
               href="/admin/dashboard" class="btn btn-outline-secondary">✕</a>
        </div>
    </form>

    <table class="table table-hover">
        <thead>
        <tr>
            <th>ID</th>
            <th>Логин</th>
            <th>Email</th>
            <th>ФИО</th>
            <th>Роль</th>
            <th>Статус</th>
            <th>Баланс</th>
            <th style="width: 220px;">Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user : ${users}">
            <td th:text="${user.id}"></td>
            <td th:text="${user.username}"></td>
            <td th:text="${user.email}"></td>
            <td th:text="${user.fullName}"></td>
            <td th:text="${user.role.displayName}"></td>
            <td>
                <span class="status" th:classappend="${user.enabled ? 'status-active' : 'status-done'}"
                      th:text="${user.enabled ? 'Активен' : 'Отключён'}"></span>
            </td>
            <td>
                <a th:if="${user.role.name() == 'MASTER'}"
                   th:href="@{/admin/masters/{id}/balance(id=${user.id})}"
                   th:text="${user.balance + ' ₽'}"
                   class="fw-semibold text-decoration-none"></a>
                <span th:unless="${user.role.name() == 'MASTER'}" class="text-muted">—</span>
            </td>
            <td>
                <div class="user-actions">
                    <form th:action="@{/admin/users/{id}/role(id=${user.id})}" method="post" class="role-form">
                        <select name="role" class="form-select form-select-sm">
                            <option value="RESIDENT" th:selected="${user.role.name() == 'RESIDENT'}">Житель</option>
                            <option value="MASTER"   th:selected="${user.role.name() == 'MASTER'}">Мастер</option>
                            <option value="ADMIN"    th:selected="${user.role.name() == 'ADMIN'}">Админ</option>
                        </select>
                        <button type="submit" class="btn btn-sm btn-primary">Сохранить</button>
                    </form>
                    <div class="toggle-delete-row">
                        <form th:action="@{/admin/users/{id}/enabled(id=${user.id})}" method="post">
                            <button type="submit" class="btn btn-sm w-100"
                                    th:classappend="${user.enabled ? 'btn-outline-warning' : 'btn-outline-success'}"
                                    th:text="${user.enabled ? 'Отключить' : 'Включить'}"></button>
                        </form>
                        <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post">
                            <button type="submit" class="btn btn-sm btn-outline-danger w-100">Удалить</button>
                        </form>
                    </div>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
