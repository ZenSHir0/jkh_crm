<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Пользователи — ЖКХ.Портал</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"/>

<div class="page-wrap">

  <div class="page-hero admin-hero">
    <div>
      <div class="hero-eyebrow">Управление</div>
      <h1 class="hero-title">Пользователи</h1>
    </div>
  </div>

  <!-- Search -->
  <form method="get" class="d-flex gap-2 mb-3">
    <input type="text" name="search" class="form-control"
           placeholder="Поиск по имени, логину, email..."
           th:value="${search}"
           style="max-width:340px">
    <button type="submit" class="btn-prim"><i class="bi bi-search"></i> Найти</button>
    <a th:if="${search != null and !#strings.isEmpty(search)}"
       href="/admin/dashboard" class="btn-ghost"><i class="bi bi-x"></i> Сброс</a>
  </form>

  <!-- Table -->
  <div class="card">
    <div class="req-row th-row"
         style="grid-template-columns:44px 1fr 100px 90px 80px 180px">
      <span class="col-hdr">ID</span>
      <span class="col-hdr">Пользователь</span>
      <span class="col-hdr">Роль</span>
      <span class="col-hdr">Баланс</span>
      <span class="col-hdr">Статус</span>
      <span class="col-hdr">Действия</span>
    </div>

    <div th:if="${users.isEmpty()}"
         style="padding:3rem 1.25rem;text-align:center;color:var(--muted)">
      <div style="font-size:2rem;margin-bottom:.5rem;opacity:.4"><i class="bi bi-people"></i></div>
      <p style="margin:0;font-size:.875rem">Пользователи не найдены</p>
    </div>

    <div th:each="user : ${users}"
         class="req-row"
         style="grid-template-columns:44px 1fr 100px 90px 80px 180px;cursor:default">
      <span class="req-num" th:text="${user.id}"></span>

      <div>
        <div class="req-title-main" th:text="${user.fullName}"></div>
        <div class="req-type" th:text="${user.username + ' · ' + user.email}"></div>
      </div>

      <!-- Role badge -->
      <span>
        <span th:if="${user.role.name() == 'MASTER'}"   class="badge-master">Мастер</span>
        <span th:if="${user.role.name() == 'RESIDENT'}" class="badge-resident">Житель</span>
        <span th:if="${user.role.name() == 'ADMIN'}"    class="badge-admin">Админ</span>
      </span>

      <!-- Balance -->
      <span>
        <a th:if="${user.role.name() == 'MASTER'}"
           th:href="@{/admin/masters/{id}/balance(id=${user.id})}"
           th:text="${user.balance + ' ₽'}"
           style="font-weight:700;font-family:'Space Grotesk',sans-serif;font-size:.85rem;color:var(--success);text-decoration:none"></a>
        <span th:unless="${user.role.name() == 'MASTER'}" style="color:var(--muted)">—</span>
      </span>

      <!-- Status -->
      <span class="status"
            th:classappend="${user.enabled} ? 'status-active' : 'status-done'"
            th:text="${user.enabled ? 'Активен' : 'Откл.'}"></span>

      <!-- Actions -->
      <div style="display:flex;flex-direction:column;gap:5px">
        <form th:action="@{/admin/users/{id}/role(id=${user.id})}" method="post"
              class="d-flex gap-1 align-items-center">
          <select name="role" class="form-control" style="flex:1;font-size:.75rem;padding:.25rem .5rem;height:30px">
            <option value="RESIDENT" th:selected="${user.role.name() == 'RESIDENT'}">Житель</option>
            <option value="MASTER"   th:selected="${user.role.name() == 'MASTER'}">Мастер</option>
            <option value="ADMIN"    th:selected="${user.role.name() == 'ADMIN'}">Админ</option>
          </select>
          <button type="submit" class="btn-ghost btn-sm"><i class="bi bi-check2"></i></button>
        </form>
        <div class="d-flex gap-1">
          <form th:action="@{/admin/users/{id}/enabled(id=${user.id})}" method="post" style="flex:1">
            <button type="submit" class="btn-ghost btn-sm w-100"
                    th:text="${user.enabled ? 'Откл.' : 'Вкл.'}"></button>
          </form>
          <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post" style="flex:1">
            <button type="submit" class="btn-danger-ghost w-100">
              <i class="bi bi-trash"></i>
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

</div>

<footer th:replace="~{fragments/layout :: footer}"/>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
