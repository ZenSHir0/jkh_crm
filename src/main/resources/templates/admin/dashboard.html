<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Админ-панель</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/home">На главную</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/logout">Выход</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <h2>Список пользователей</h2>
    <table class="table table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>Логин</th>
            <th>Почта</th>
            <th>ФИО</th>
            <th>Роль</th>
            <th>Активен</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user : ${users}">
            <td th:text="${user.id}"></td>
            <td th:text="${user.username}"></td>
            <td th:text="${user.email}"></td>
            <td th:text="${user.getFullName}"></td>
            <td th:text="${user.role.getDisplayName}"></td>
            <td th:text="${user.enabled ? 'Да' : 'Нет'}"></td>
            <td>
                <form th:action="@{/admin/users/{id}/role(id=${user.id})}" method="post" class="d-inline">
                    <label for="role" class="visually-hidden">Выбрать роль</label>
                    <select name="role" id="role">
                        <option value="RESIDENT" th:selected="${user.role == 'RESIDENT'}">Житель</option>
                        <option value="MASTER" th:selected="${user.role == 'MASTER'}">Мастер</option>
                        <option value="ADMIN" th:selected="${user.role == 'ADMIN'}">Админ</option>
                    </select>
                    <button type="submit" class="btn btn-sm btn-primary">Изменить роль</button>
                </form>
                <form th:action="@{/admin/users/{id}/enabled(id=${user.id})}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-sm" th:classappend="${user.enabled ? 'btn-warning' : 'btn-success'}" th:text="${user.enabled ? 'Отключить' : 'Включить'}"/>
                </form>
                <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-sm btn-danger">Удалить</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
