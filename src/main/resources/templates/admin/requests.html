<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Заявки — ЖКХ.Портал</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"/>

<div class="page-wrap">

  <div class="page-hero admin-hero">
    <div>
      <div class="hero-eyebrow">Управление</div>
      <h1 class="hero-title">Заявки</h1>
    </div>
  </div>

  <!-- Filters -->
  <div class="card" style="padding:1.1rem 1.25rem;margin-bottom:1.25rem">
    <form method="get">
      <div class="row g-2 align-items-end">
        <div class="col-md-4">
          <label class="form-label-custom">Поиск</label>
          <input type="text" name="search" class="form-input"
                 placeholder="По заголовку или описанию..."
                 th:value="${search}">
        </div>
        <div class="col-md-2">
          <label class="form-label-custom">Статус</label>
          <select name="status" class="form-input">
            <option value="">Все</option>
            <option th:each="s : ${statuses}"
                    th:value="${s}"
                    th:text="${s.displayName}"
                    th:selected="${s == selectedStatus}"></option>
          </select>
        </div>
        <div class="col-md-2">
          <label class="form-label-custom">Тип</label>
          <select name="type" class="form-input">
            <option value="">Все</option>
            <option th:each="t : ${types}"
                    th:value="${t}"
                    th:text="${t.displayName}"
                    th:selected="${t == selectedType}"></option>
          </select>
        </div>
        <div class="col-md-2">
          <label class="form-label-custom">Дата от</label>
          <input type="date" name="startDate" class="form-input" th:value="${startDate}">
        </div>
        <div class="col-md-2">
          <label class="form-label-custom">Дата до</label>
          <input type="date" name="endDate" class="form-input" th:value="${endDate}">
        </div>
        <div class="col-12 d-flex gap-2 pt-1">
          <button type="submit" class="btn-prim"><i class="bi bi-search"></i> Найти</button>
          <a href="/admin/requests" class="btn-ghost"><i class="bi bi-x"></i> Сброс</a>
        </div>
      </div>
    </form>
  </div>

  <!-- Table -->
  <div class="card">
    <div class="req-row th-row"
         style="grid-template-columns:44px 1fr 120px 120px 100px 80px">
      <span class="col-hdr">№</span>
      <span class="col-hdr">Заявка</span>
      <span class="col-hdr">Мастер</span>
      <span class="col-hdr">Статус</span>
      <span class="col-hdr">Дата</span>
      <span></span>
    </div>

    <div th:if="${requests.isEmpty()}"
         style="padding:3rem 1.25rem;text-align:center;color:var(--muted)">
      <div style="font-size:2rem;margin-bottom:.5rem;opacity:.4"><i class="bi bi-clipboard-x"></i></div>
      <p style="margin:0;font-size:.875rem">Заявок не найдено</p>
    </div>

    <div th:each="request : ${requests}"
         class="req-row"
         style="grid-template-columns:44px 1fr 120px 120px 100px 80px"
         th:onclick="|location.href='/admin/requests/${request.id}'|">
      <span class="req-num" th:text="'#' + ${request.id}"></span>

      <div>
        <div class="req-title-main" th:text="${request.title}"></div>
        <div class="req-type"
             th:text="${request.type.displayName + ' · ' + request.resident.fullName}"></div>
      </div>

      <span style="font-size:.82rem;font-weight:700;color:var(--navy2)"
            th:text="${request.master?.fullName ?: '—'}"
            th:style="${request.master == null} ? 'color:var(--muted);font-style:italic' : ''"></span>

      <span class="status" th:classappend="${request.status.badgeClass}"
            th:text="${request.status.displayName}"></span>

      <span class="req-date"
            th:text="${#temporals.format(request.createdAt, 'dd.MM.yyyy')}"></span>

      <div style="display:flex;justify-content:flex-end">
        <a th:href="@{/admin/requests/{id}(id=${request.id})}"
           class="btn-ghost btn-sm" onclick="event.stopPropagation()">Детали</a>
      </div>
    </div>
  </div>

  <!-- Pagination -->
  <nav th:if="${totalPages > 1}" aria-label="Пагинация" style="margin-top:1.25rem">
    <ul class="pagination justify-content-center">
      <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled' : ''">
        <a class="page-link" th:href="@{/admin/requests(page=0)}" title="Первая">«</a>
      </li>
      <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled' : ''">
        <a class="page-link" th:href="@{/admin/requests(page=${currentPage - 1})}" title="Назад">‹</a>
      </li>
      <li th:each="p : ${#numbers.sequence(pageStart, pageEnd)}"
          class="page-item" th:classappend="${p == currentPage} ? 'active' : ''">
        <a class="page-link" th:href="@{/admin/requests(page=${p})}" th:text="${p + 1}"></a>
      </li>
      <li class="page-item disabled">
        <span class="page-link page-info"
              th:text="${currentPage + 1} + ' / ' + ${totalPages}"></span>
      </li>
      <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled' : ''">
        <a class="page-link" th:href="@{/admin/requests(page=${currentPage + 1})}" title="Вперёд">›</a>
      </li>
      <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled' : ''">
        <a class="page-link" th:href="@{/admin/requests(page=${totalPages - 1})}" title="Последняя">»</a>
      </li>
    </ul>
  </nav>

</div>

<footer th:replace="~{fragments/layout :: footer}"/>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
