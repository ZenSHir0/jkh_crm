<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Новый пароль</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<div class="auth-wrap">
    <div class="auth-card">

        <div class="auth-header">
            <p class="auth-logo">ЖКХ<span>.</span>Портал</p>
            <p class="auth-subtitle">Придумайте новый пароль</p>
        </div>

        <div class="auth-body">

            <div th:if="${param.error != null and param.error[0] == 'mismatch'}" class="auth-alert danger">
                Пароли не совпадают
            </div>

            <form th:action="@{/reset-password}" method="post" id="resetForm" novalidate>
                <input type="hidden" name="token" th:value="${token}"/>

                <div class="auth-field">
                    <label class="auth-label" for="password">Новый пароль</label>
                    <input class="auth-input" type="password" id="password" name="password" autocomplete="new-password"/>
                    <div class="field-error" id="password-error">Введите пароль</div>
                </div>

                <div class="auth-field">
                    <label class="auth-label" for="confirmPassword">Повторите пароль</label>
                    <input class="auth-input" type="password" id="confirmPassword" name="confirmPassword" autocomplete="new-password"/>
                    <div class="field-error" id="confirm-error">Введите пароль</div>
                </div>

                <button type="submit" class="auth-btn">Сохранить пароль</button>
            </form>
        </div>
    </div>
</div>

<script>
    document.getElementById('resetForm').addEventListener('submit', function(e) {
        let valid = true;

        const password = document.getElementById('password');
        const passwordError = document.getElementById('password-error');
        if (!password.value.trim()) {
            password.classList.add('is-invalid');
            passwordError.classList.add('visible');
            valid = false;
        } else {
            password.classList.remove('is-invalid');
            passwordError.classList.remove('visible');
        }

        const confirm = document.getElementById('confirmPassword');
        const confirmError = document.getElementById('confirm-error');
        if (!confirm.value.trim()) {
            confirm.classList.add('is-invalid');
            confirmError.classList.add('visible');
            valid = false;
        } else {
            confirm.classList.remove('is-invalid');
            confirmError.classList.remove('visible');
        }

        if (valid && password.value !== confirm.value) {
            confirm.classList.add('is-invalid');
            confirmError.textContent = 'Пароли не совпадают';
            confirmError.classList.add('visible');
            valid = false;
        }

        if (!valid) e.preventDefault();
    });
</script>
</body>
</html>
