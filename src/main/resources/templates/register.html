<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card">
        <div class="card-header text-center">
          <h4>Регистрация жителя</h4>
        </div>
        <div class="card-body">
          <div th:if="param.verification-sent" class="alert alert-success">
            На вашу почту направлена ссылка для подтверждения создания аккаунта
          </div>
          <form th:action="@{/register}" method="post" th:object="${user}">
            <div class="mb-3">
              <label for="username" class="form-label">Логин</label>
              <input type="text" class="form-control" id="username" th:field="*{username}" required>
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Пароль</label>
              <input type="password" class="form-control" id="password" th:field="*{password}" required>
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" class="form-control" id="email" th:field="*{email}" required>
            </div>
            <div class="mb-3">
              <label for="phone" class="form-label">Номер телефона</label>
              <input type="tel"  class="form-control" id="phone" th:field="*{phone}">
            </div>
            <div class="mb-3">
              <label for="name" class="form-label">Имя</label>
              <input type="text" class="form-control" id="name" th:field="*{name}" required>
            </div>
            <div class="mb-3">
              <label for="surname" class="form-label">Фамилия</label>
              <input type="text" class="form-control" id="surname" th:field="*{surname}" required>
            </div>
            <div class="mb-3">
              <label for="lastName" class="form-label">Отчество</label>
              <input type="text" class="form-control" id="lastName" th:field="*{lastName}">
            </div>
            <button type="submit" class="btn btn-success w-100">Зарегистрироваться</button>
          </form>
          <div class="text-center mt-3">
            <a href="/login">Уже есть аккаунт? Войти</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
