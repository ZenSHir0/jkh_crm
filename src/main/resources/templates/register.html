<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Регистрация</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" th:href="@{/css/variables.css}">
  <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">

    <div class="auth-header">
      <p class="auth-logo">ЖКХ<span>.</span>Портал</p>
      <p class="auth-subtitle">Создайте аккаунт.</p>
    </div>

    <div class="auth-body">

      <div th:if="${param.verificationsent}" class="auth-alert success">
        ✓ Ссылка для подтверждения отправлена на вашу почту
      </div>

      <form th:action="@{/register}" method="post" th:object="${user}" id="registerForm" novalidate>

        <!-- Аккаунт -->
        <div class="auth-section-label" style="border-top: none; margin-top: 0; padding-top: 0;">Данные для входа</div>

        <div class="auth-field">
          <label class="auth-label" for="username">Логин</label>
          <input class="auth-input" type="text" id="username" th:field="*{username}" autocomplete="username"/>
          <div class="field-error" id="username-error">Введите логин</div>
        </div>

        <div class="auth-field">
          <label class="auth-label" for="email">Email</label>
          <input class="auth-input" type="email" id="email" th:field="*{email}" autocomplete="email"/>
          <div class="field-error" id="email-error">Введите email</div>
        </div>

        <div class="auth-field">
          <label class="auth-label" for="password">Пароль</label>
          <input class="auth-input" type="password" id="password" th:field="*{password}" autocomplete="new-password"/>
          <div class="field-error" id="password-error">Введите пароль</div>
        </div>

        <!-- Личные данные -->
        <div class="auth-section-label">Личные данные</div>

        <div class="auth-grid">
          <div class="auth-field">
            <label class="auth-label" for="surname">Фамилия</label>
            <input class="auth-input" type="text" id="surname" th:field="*{surname}"/>
            <div class="field-error" id="surname-error">Введите фамилию</div>
          </div>
          <div class="auth-field">
            <label class="auth-label" for="name">Имя</label>
            <input class="auth-input" type="text" id="name" th:field="*{name}"/>
            <div class="field-error" id="name-error">Введите имя</div>
          </div>
        </div>

        <div class="auth-grid">
          <div class="auth-field">
            <label class="auth-label" for="lastName">
              Отчество <span class="optional-label">необязательно</span>
            </label>
            <input class="auth-input" type="text" id="lastName" th:field="*{lastName}"/>
          </div>
          <div class="auth-field">
            <label class="auth-label" for="phone">
              Телефон <span class="optional-label">необязательно</span>
            </label>
            <input class="auth-input" type="tel" id="phone" th:field="*{phone}" placeholder="+7 (999) 000-00-00"/>
          </div>
        </div>

        <button type="submit" class="auth-btn">Зарегистрироваться</button>
      </form>

      <div class="auth-footer">
        Уже есть аккаунт? <a href="/login">Войти</a>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/imask"></script>
<script>
  // Маска телефона
  IMask(document.getElementById('phone'), {
    mask: '+{7} (000) 000-00-00'
  });

  // Валидация
  document.getElementById('registerForm').addEventListener('submit', function(e) {
    let valid = true;

    const required = [
      { id: 'username',  errorId: 'username-error',  msg: 'Введите логин' },
      { id: 'email',     errorId: 'email-error',     msg: 'Введите email' },
      { id: 'password',  errorId: 'password-error',  msg: 'Введите пароль' },
      { id: 'surname',   errorId: 'surname-error',   msg: 'Введите фамилию' },
      { id: 'name',      errorId: 'name-error',      msg: 'Введите имя' },
    ];

    required.forEach(function(field) {
      const input = document.getElementById(field.id);
      const error = document.getElementById(field.errorId);
      if (!input.value.trim()) {
        input.classList.add('is-invalid');
        error.classList.add('visible');
        valid = false;
      } else {
        input.classList.remove('is-invalid');
        error.classList.remove('visible');
      }
    });

    // email формат
    const email = document.getElementById('email');
    const emailError = document.getElementById('email-error');
    if (email.value.trim() && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value)) {
      email.classList.add('is-invalid');
      emailError.textContent = 'Неверный формат email';
      emailError.classList.add('visible');
      valid = false;
    }

    if (!valid) e.preventDefault();
  });
</script>
</body>
</html>
