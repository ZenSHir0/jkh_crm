<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Регистрация</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" th:href="@{/css/variables.css}">
  <link rel="stylesheet" th:href="@{/css/auth.css}">
  <style>
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .auth-card {
      width: 100%;
      max-width: 480px;
      background: #fff;
      border-radius: var(--bs-border-radius-lg);
      border: 1px solid var(--bs-border-color);
      overflow: hidden;
    }

    .auth-header {
      background: #1A1A2E;
      padding: 2rem 2rem 1.75rem;
      text-align: center;
    }

    .auth-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.4rem;
      color: #fff;
      letter-spacing: -0.02em;
      margin: 0 0 4px;
    }

    .auth-logo span { color: var(--accent); }

    .auth-subtitle {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.45);
      margin: 0;
    }

    .auth-body { padding: 2rem; }

    .auth-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted-custom);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
      display: block;
    }

    .auth-input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--bs-border-color);
      border-radius: var(--bs-border-radius);
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      color: var(--bs-body-color);
      background: var(--bs-body-bg);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .auth-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(46,91,255,0.12);
    }

    .auth-input.is-invalid { border-color: var(--danger); }

    .auth-field { margin-bottom: 1rem; }

    .field-error {
      font-size: 0.8rem;
      color: var(--danger);
      margin-top: 4px;
      display: none;
    }

    .field-error.visible { display: block; }

    /* Двухколоночная сетка для некоторых полей */
    .auth-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 1rem;
    }

    .auth-section-label {
      font-family: 'Syne', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted-custom);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 4px 0 10px;
      border-top: 1px solid var(--bs-border-color);
      margin: 8px 0 12px;
    }

    .auth-btn {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      color: var(--accent);
      border: none;
      border-radius: var(--bs-border-radius);
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 0.5rem;
    }

    .auth-btn:hover { background: var(--accent-dark); }

    .auth-footer {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.875rem;
      color: var(--text-muted-custom);
    }

    .auth-footer a {
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
    }

    .auth-footer a:hover { text-decoration: underline; }

    .auth-alert {
      border-radius: var(--bs-border-radius);
      padding: 10px 14px;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 1.25rem;
    }

    .auth-alert.success {
      background: var(--success-bg);
      color: #0F6E56;
      border: 1px solid #9FE1CB;
    }

    .optional-label {
      font-size: 0.72rem;
      color: var(--text-muted-custom);
      font-weight: 400;
      margin-left: 4px;
      text-transform: none;
      letter-spacing: 0;
    }
  </style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">

    <div class="auth-header">
      <p class="auth-logo">ЖКХ<span>.</span>Портал</p>
      <p class="auth-subtitle">Создайте личный кабинет</p>
    </div>

    <div class="auth-body">

      <div th:if="${param.verificationsent}" class="auth-alert success">
        ✓ Ссылка для подтверждения отправлена на вашу почту
      </div>

      <form th:action="@{/register}" method="post" th:object="${user}" id="registerForm" novalidate>

        <!-- Аккаунт -->
        <div class="auth-section-label" style="border-top: none; margin-top: 0; padding-top: 0;">Данные для входа</div>

        <div class="auth-grid">
          <div class="auth-field">
            <label class="auth-label" for="username">Логин</label>
            <input class="auth-input" type="text" id="username" th:field="*{username}" autocomplete="username"/>
            <div class="field-error" id="username-error">Введите логин</div>
          </div>
          <div class="auth-field">
            <label class="auth-label" for="email">Email</label>
            <input class="auth-input" type="email" id="email" th:field="*{email}" autocomplete="email"/>
            <div class="field-error" id="email-error">Введите email</div>
          </div>
        </div>

        <div class="auth-field">
          <label class="auth-label" for="password">Пароль</label>
          <input class="auth-input" type="password" id="password" th:field="*{password}" autocomplete="new-password"/>
          <div class="field-error" id="password-error">Введите пароль</div>
        </div>

        <!-- Личные данные -->
        <div class="auth-section-label">Личные данные</div>

        <div class="auth-grid">
          <div class="auth-field">
            <label class="auth-label" for="surname">Фамилия</label>
            <input class="auth-input" type="text" id="surname" th:field="*{surname}"/>
            <div class="field-error" id="surname-error">Введите фамилию</div>
          </div>
          <div class="auth-field">
            <label class="auth-label" for="name">Имя</label>
            <input class="auth-input" type="text" id="name" th:field="*{name}"/>
            <div class="field-error" id="name-error">Введите имя</div>
          </div>
        </div>

        <div class="auth-grid">
          <div class="auth-field">
            <label class="auth-label" for="lastName">
              Отчество <span class="optional-label">необязательно</span>
            </label>
            <input class="auth-input" type="text" id="lastName" th:field="*{lastName}"/>
          </div>
          <div class="auth-field">
            <label class="auth-label" for="phone">
              Телефон <span class="optional-label">необязательно</span>
            </label>
            <input class="auth-input" type="tel" id="phone" th:field="*{phone}" placeholder="+7 (999) 000-00-00"/>
          </div>
        </div>

        <button type="submit" class="auth-btn">Зарегистрироваться</button>
      </form>

      <div class="auth-footer">
        Уже есть аккаунт? <a href="/login">Войти</a>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/imask"></script>
<script>
  // Маска телефона
  IMask(document.getElementById('phone'), {
    mask: '+{7} (000) 000-00-00'
  });

  // Валидация
  document.getElementById('registerForm').addEventListener('submit', function(e) {
    let valid = true;

    const required = [
      { id: 'username',  errorId: 'username-error',  msg: 'Введите логин' },
      { id: 'email',     errorId: 'email-error',     msg: 'Введите email' },
      { id: 'password',  errorId: 'password-error',  msg: 'Введите пароль' },
      { id: 'surname',   errorId: 'surname-error',   msg: 'Введите фамилию' },
      { id: 'name',      errorId: 'name-error',      msg: 'Введите имя' },
    ];

    required.forEach(function(field) {
      const input = document.getElementById(field.id);
      const error = document.getElementById(field.errorId);
      if (!input.value.trim()) {
        input.classList.add('is-invalid');
        error.classList.add('visible');
        valid = false;
      } else {
        input.classList.remove('is-invalid');
        error.classList.remove('visible');
      }
    });

    // email формат
    const email = document.getElementById('email');
    const emailError = document.getElementById('email-error');
    if (email.value.trim() && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value)) {
      email.classList.add('is-invalid');
      emailError.textContent = 'Неверный формат email';
      emailError.classList.add('visible');
      valid = false;
    }

    if (!valid) e.preventDefault();
  });
</script>
</body>
</html>
